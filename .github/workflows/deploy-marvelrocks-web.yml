name: Deploy Web to Azure Static Web Apps

on:
  push:
    branches:
      - master
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-marvelrocks-web.yml"
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy Frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build
          cp staticwebapp.config.json build/
        env:
          REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}

      - name: Verify deployment token is set
        env:
          SWA_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
        run: |
          if [ -z "$SWA_TOKEN" ]; then
            echo "ERROR: AZURE_STATIC_WEB_APPS_API_TOKEN secret is empty or missing"
            exit 1
          fi
          echo "Deployment token length: ${#SWA_TOKEN}"

      - name: Deploy to Azure Static Web Apps
        working-directory: frontend
        env:
          SWA_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
        run: npx @azure/static-web-apps-cli@latest deploy ./build --deployment-token "$SWA_TOKEN" --env production
