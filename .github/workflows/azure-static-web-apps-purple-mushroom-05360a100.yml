name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - master
    paths:
      - "frontend/**"
      - ".github/workflows/azure-static-web-apps-purple-mushroom-05360a100.yml"
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy Frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify deployment token secret
        env:
          SWA_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_PURPLE_MUSHROOM_05360A100 }}
        run: |
          if [ -z "$SWA_TOKEN" ]; then
            echo "::error::GitHub secret AZURE_STATIC_WEB_APPS_API_TOKEN_PURPLE_MUSHROOM_05360A100 is missing or empty"
            exit 1
          fi
          echo "Deployment token length: ${#SWA_TOKEN}"

      - name: Build and Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_PURPLE_MUSHROOM_05360A100 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend
          output_location: build
          app_build_command: npm install --no-audit --no-fund && npm run build
          production_branch: master
        env:
          REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}
          CI: false
